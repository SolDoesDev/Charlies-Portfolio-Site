name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build
        env:
          VUE_APP_YOUTUBE_API_KEY: ${{ secrets.VUE_APP_YOUTUBE_API_KEY }}
          VUE_APP_YOUTUBE_CHANNEL_KEY: ${{ secrets.VUE_APP_YOUTUBE_CHANNEL_KEY }}

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
